name: Windows

on:
  workflow_dispatch:
  push:
    tags:
      - release-v*

env:
  CUDA_VERSION: '13.2.0'
  CUDA_VERSION_MAJOR: '13'
  CUDA_VERSION_MINOR: '2'

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Setup CUDA
        id: cuda-toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'
          use-github-cache: true

      - name: Export CUDA variables
        shell: pwsh
        run: |
          $cudaPath = "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"
          if (-not $cudaPath) {
            $cudaPath = $env:CUDA_PATH
          }

          Add-Content $env:GITHUB_ENV "CUDA_PATH=$cudaPath"
          Add-Content $env:GITHUB_ENV "CUDA_PATH_V${{ env.CUDA_VERSION_MAJOR }}_${{ env.CUDA_VERSION_MINOR }}=$cudaPath"
          Add-Content $env:GITHUB_PATH "$cudaPath\bin"

      - name: CUDA check
        shell: pwsh
        run: |
          Write-Host "CUDA PATH: $env:CUDA_PATH"
          nvcc -V

      - name: Build application
        shell: pwsh
        run: |
          msbuild CudaKeeloq.vcxproj `
            /m `
            /t:Rebuild `
            /p:Configuration=Release `
            /p:Platform=x64

      - name: Create artifact archive
        shell: pwsh
        run: |
          $artifactDir = "artifacts"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          Copy-Item ".build\x64\Release\win\CudaKeeloq.exe" "$artifactDir\CudaKeeloq.exe" -Force
          Copy-Item "examples" "$artifactDir\examples" -Recurse -Force

          Compress-Archive `
            -Path "$artifactDir\CudaKeeloq.exe", "$artifactDir\examples" `
            -DestinationPath "$artifactDir\cudakeeloq-windows-x64.zip" `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cudakeeloq-windows-x64
          path: artifacts/cudakeeloq-windows-x64.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/cudakeeloq-windows-x64.zip
